# hot-pot.ton-ton.fun — Hotpot Party (Next.js standalone on :3005)

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hot-pot.ton-ton.fun;
    return 301 https://$host$request_uri;
}

# HTTPS — terminate TLS with the Let's Encrypt cert and proxy to the app
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hot-pot.ton-ton.fun;

    ssl_certificate     /etc/letsencrypt/live/hot-pot.ton-ton.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hot-pot.ton-ton.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
